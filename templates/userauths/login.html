{% load static %}
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — MarocTour</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="{%static '/assets/css/style.css'%}" rel="stylesheet" />

</head>
<body class="auth-body">
  <div class="auth-split">


    <!-- Right panel (form) -->
    <div class="auth-panel-right">
      <div class="auth-form-wrap">
        <h1 class="auth-title">Connexion</h1>
        <p class="auth-sub">Pas encore de compte ? <a href="{% url 'userauths:register'%}">S'inscrire gratuitement</a></p>

     <form class="mt-4" method="POST" >
            {% csrf_token %}
          <div class="form-group-custom mb-3">
            <label>Email</label>
           
            
            
            <div class="input-icon-wrap">
              <i class="fas fa-user"></i>
              <input type="email" name="email" class="form-control" placeholder="votre_email" />
            </div>
          </div>
          <div class="form-group-custom mb-4">
            <div class="d-flex justify-content-between">
              <label>Mot de passe</label>
            
            </div>
            <div class="input-icon-wrap">
              <i class="fas fa-lock"></i>
              <input type="password" name="password" class="form-control" placeholder="••••••••"  />
            </div>
          </div>
        
          <button type="submit" class="btn btn-primary-custom w-100 btn-lg">
            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
          </button>
        </form>


      

    
      </div>
    </div>
  </div>


</body>
</html>
